  - type: Features
    data:
      - name: Agent OS 2.0
        description: >-
          Multi-channel agent operating system spanning chat, voice, email,
          SMS, WhatsApp, ChatGPT, and contact-center integrations with shared
          memory, learning, and live human assist.
      - name: Agent Studio
        description: >-
          No-code builder for CX teams to design agents using natural-language
          instructions and a collaborative workspace with simulations and
          guardrails.
      - name: Agent SDK
        description: >-
          Developer-facing programmatic layer that lets engineering teams
          write customer journeys as code, version them in their existing
          source control, and orchestrate composable skills and multi-step
          workflows.
      - name: Agent Data Platform
        description: >-
          Persistent agent memory unifying structured customer data (CRM,
          billing) with unstructured conversation history to enable
          personalized, relationship-aware responses across sessions.
      - name: Insights
        description: >-
          Analytics suite — Explorer (deep-research style conversation
          analysis), Monitors, Experiments, and Observability — for measuring
          and improving agent performance.
      - name: Live Assist
        description: >-
          Human-in-the-loop interface that surfaces real-time answers and
          captures conversation details to augment human agents.
      - name: Voice
        description: >-
          Real-time voice agents benchmarked publicly via Sierra's τ-voice
          benchmark; deployable into contact centers and IVR replacements.
      - name: Ghostwriter
        description: >-
          Agent-building agent that ingests SOPs, support transcripts,
          whiteboard photos, audio recordings, and plain-English descriptions
          to generate production-ready agents across voice, chat, and email
          in 30+ languages.
      - name: Trust and Reliability
        description: >-
          Built-in guardrails, evaluations, simulations, and observability
          targeted at regulated industries (financial services, healthcare,
          telecom).
      - name: Outcome-Based Pricing
        description: >-
          Customers pay per resolved case (outcome) rather than per seat or
          per token, aligning Sierra's revenue with measurable customer
          outcomes.
  - type: UseCases
    data:
      - name: Customer Service Automation
        description: >-
          Branded AI agents handle Tier-1 support across chat, voice, SMS,
          and email — Chime, Ramp, Wilson, and Pendulum report case resolution
          rates of 70–90%.
      - name: Voice / IVR Replacement
        description: >-
          Real-time voice agents replace traditional IVR menus for providers
          such as R1 RCM, Singtel, and ADT, which handles ~2M monthly
          inquiries.
      - name: Sales and Conversion
        description: >-
          Conversational agents drive product discovery and conversion
          (Rocket Mortgage 4× conversion, Sun & Ski 3× conversion, Redfin 2×
          listing views).
      - name: Healthcare Member Support
        description: >-
          HIPAA-compliant agents for chronic care management, member
          enrollment, and patient navigation (Sutter Health, Cigna,
          WeightWatchers).
      - name: Financial Services
        description: >-
          Agents for fintech onboarding, account servicing, and dispute
          resolution (SoFi +33 NPS, Chime 70%+ resolution, Brex 90% faster).
      - name: Retail and E-Commerce
        description: >-
          Order tracking, returns, sizing, and personalization across brands
          like Casper, Minted, ThirdLove, BARK, Chubbies, and Sonos.
      - name: Subscription and Media
        description: >-
          Subscriber retention and support for SiriusXM (34M subscribers),
          AOL, Tubi, and WeightWatchers.
      - name: Telecom
        description: >-
          Plan changes, troubleshooting, and billing for Singtel and Next.
      - name: Multi-Brand Agent Hosting
        description: >-
          Single agent runtime serving multiple brands under one customer
          (e.g., Imprint).
  - type: Integrations
