aid: sierra-ai
name: Sierra
description: >-
  Sierra is a conversational AI platform for customer experience, founded in
  2023 by Bret Taylor (former co-CEO of Salesforce, CTO of Facebook, co-creator
  of Google Maps, and current chair of OpenAI's board) and Clay Bavor (former
  Google VP who led Labs, Project Starline, Google Lens, and Google Workspace).
  Headquartered in New York with offices in San Francisco, Atlanta, London,
  Paris, Madrid, Toronto, Singapore, and Tokyo, Sierra builds branded AI agents
  that handle customer service, sales, and operational interactions across
  chat, voice, SMS, WhatsApp, email, and ChatGPT for enterprises including
  SiriusXM, WeightWatchers, Sonos, ADT, Chime, Sutter Health, Rocket Mortgage,
  Ramp, Brex, SoFi, Casper, CLEAR, Vivid Seats, Wayfair, AOL, and approximately
  40% of the Fortune 50. The platform is anchored by Agent OS 2.0, with
  Agent Studio (no-code builder for CX teams), Agent SDK (a developer-facing
  programmatic layer that lets engineering teams write customer journeys as
  code), Agent Data Platform (persistent cross-session memory unifying
  structured CRM data and unstructured conversation history), Insights
  (analytics — Explorer, Monitors, Experiments, Observability), Live Assist
  (human-in-the-loop), Voice (real-time voice agents), and Ghostwriter (an
  agent-building agent that generates production-ready multilingual agents
  from SOPs, transcripts, audio recordings, whiteboard photos, or plain
  English in 30+ languages). Sierra runs an outcome-based pricing model —
  customers pay per resolved case, not per seat or per token — and operates a
  gated developer documentation portal at docs.sierra.ai available only to
  contracted customers. There is no public REST API, no public Agent SDK
  package, no public GitHub org, and no self-serve sign-up; access is via
  enterprise sales. Sierra raised $950M at a $15.8B valuation in May 2026
  (after a $350M round at $10B earlier in the year) and reported $150M ARR
  within roughly two years of public launch. Sierra also acquired the French
  agent-evaluation startup Fragment in April 2026 and publishes the public
  τ-bench, τ-voice, and τ-knowledge benchmarks for evaluating agentic systems.
